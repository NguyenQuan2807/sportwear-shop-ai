spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sportwear_shop?useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true
    username: root
    password: abc123!@#

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080

jwt:
  secret: mySuperSecretKeyForJwtToken12345678901234567890
  expiration: 86400000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

app:
  upload:
    dir: uploads